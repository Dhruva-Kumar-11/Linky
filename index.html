<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linky | Smooth Stream P2P</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#a855f7',
                        success: '#22c55e',
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; background-color: #0f172a; transition: all 0.4s ease; }
        body.light { background-color: #f8fafc; color: #0f172a; }
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,20%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,20%,1) 0, transparent 50%); }
        .light .mesh-bg { opacity: 0.1; background-image: radial-gradient(at 0% 0%, hsla(215,100%,70%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(253,100%,70%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(280,100%,70%,1) 0, transparent 50%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25); }
        .light .glass { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(15, 23, 42, 0.1); }
        .light .text-white { color: #0f172a !important; }
        .light .text-slate-400 { color: #475569 !important; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideUp 0.4s ease forwards; }
    </style>
</head>
<body class="text-slate-300 min-h-screen">
    <div class="mesh-bg"></div>

    <!-- Header -->
    <nav class="sticky top-0 z-50 px-6 py-4 glass mb-10">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-link text-white"></i></div>
                <span class="text-xl font-black tracking-tighter text-white">Linky</span>
            </div>
            <button id="themeToggle" class="w-10 h-10 rounded-xl glass flex items-center justify-center hover:scale-105 transition-transform"><i class="fas fa-moon text-primary" id="themeIcon"></i></button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pb-20">
        <!-- Setup -->
        <section id="setupSection" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="glass p-8 rounded-3xl animate-slide">
                <h2 class="text-xl font-extrabold mb-4 text-white uppercase tracking-tight">Host Room</h2>
                <input type="text" id="hostPin" maxlength="6" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-3 text-lg font-black tracking-widest text-white uppercase focus:border-primary mb-4" placeholder="6-CHAR PIN">
                <button id="hostBtn" class="w-full py-3 bg-primary text-white rounded-xl font-bold hover:opacity-90 transition-all">START HOSTING</button>
                <div id="hostStatus" class="hidden mt-4 p-4 bg-primary/10 border border-primary/20 rounded-xl text-center">
                    <span class="text-[10px] text-primary font-black uppercase block">Live Room PIN</span>
                    <span id="displayPin" class="text-2xl font-black text-white tracking-widest uppercase"></span>
                </div>
            </div>
            <div class="glass p-8 rounded-3xl animate-slide" style="animation-delay: 0.1s">
                <h2 class="text-xl font-extrabold mb-4 text-white uppercase tracking-tight">Join Peer</h2>
                <input type="text" id="joinPin" maxlength="6" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-3 text-lg font-black tracking-widest text-white uppercase focus:border-secondary mb-4" placeholder="ENTER PIN">
                <button id="joinBtn" class="w-full py-3 bg-secondary text-white rounded-xl font-bold hover:opacity-90 transition-all">JOIN ROOM</button>
            </div>
        </section>

        <!-- Workspace -->
        <div id="workspace" class="hidden animate-slide">
            <div id="dropZone" class="glass border-2 border-dashed border-slate-700 rounded-[2.5rem] p-16 text-center group cursor-pointer hover:border-primary/50 transition-all mb-10">
                <input type="file" id="fileInput" class="hidden" multiple>
                <i class="fas fa-cloud-upload-alt text-5xl text-primary mb-4 group-hover:scale-110 transition-transform"></i>
                <h3 class="text-2xl font-black text-white">Drop Files to Share</h3>
                <p class="text-slate-500 text-sm">Symmetric Smooth Stream Active</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-4">
                    <h2 class="text-lg font-black text-white uppercase tracking-widest flex items-center">
                        <i class="fas fa-stream mr-3 text-primary"></i> Active Streams
                    </h2>
                    <div id="streamBox" class="space-y-4"></div>
                </div>
                <div class="space-y-6">
                    <div class="glass p-6 rounded-3xl h-[300px] flex flex-col">
                        <h2 class="text-sm font-black text-white uppercase mb-4 tracking-widest">P2P Chat</h2>
                        <div id="chatBox" class="flex-1 overflow-y-auto text-xs space-y-2 mb-4 scrollbar-hide"></div>
                        <div class="flex space-x-2">
                            <input type="text" id="chatInput" placeholder="..." class="flex-1 bg-slate-900/50 border border-slate-700/50 rounded-lg px-3 py-2 text-white text-xs">
                            <button id="sendBtn" class="px-3 bg-primary text-white rounded-lg"><i class="fas fa-paper-plane text-[10px]"></i></button>
                        </div>
                    </div>
                    <div class="glass p-6 rounded-3xl">
                        <h2 class="text-sm font-black text-white uppercase mb-4 tracking-widest">History</h2>
                        <div id="historyBox" class="text-[10px] font-bold space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toastRack" class="fixed top-6 right-6 z-[100] space-y-2"></div>

    <script>
        const CHUNK_SIZE = 16384 * 4; // 64KB Smooth Chunks
        let peer = null, conn = null, myPin = "", flowBuf = {};

        // UI Refs
        const UI = {
            hostPin: document.getElementById('hostPin'),
            joinPin: document.getElementById('joinPin'),
            hostBtn: document.getElementById('hostBtn'),
            joinBtn: document.getElementById('joinBtn'),
            workspace: document.getElementById('workspace'),
            setup: document.getElementById('setupSection'),
            streamBox: document.getElementById('streamBox'),
            chatBox: document.getElementById('chatBox'),
            chatInput: document.getElementById('chatInput'),
            sendBtn: document.getElementById('sendBtn'),
            history: document.getElementById('historyBox'),
            dropZone: document.getElementById('dropZone'),
            fileInput: document.getElementById('fileInput'),
            themeToggle: document.getElementById('themeToggle'),
            themeIcon: document.getElementById('themeIcon')
        };

        // Theme Toggle
        UI.themeToggle.onclick = () => {
            const isLight = document.body.classList.toggle('light');
            UI.themeIcon.className = isLight ? 'fas fa-sun text-secondary' : 'fas fa-moon text-primary';
            localStorage.setItem('linkyTheme', isLight ? 'light' : 'dark');
        };
        if(localStorage.getItem('linkyTheme') === 'light') UI.themeToggle.click();

        // P2P Core
        async function getHashedId(pin) {
            const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode("LINKY_SALT_" + pin.toUpperCase()));
            return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 16);
        }

        UI.hostBtn.onclick = async () => {
            const pin = UI.hostPin.value.trim().toUpperCase();
            if(pin.length < 3) return notify("PIN too short", "error");
            const id = await getHashedId(pin);
            initPeer("LINKY-" + id, pin);
        };

        UI.joinBtn.onclick = async () => {
            const pin = UI.joinPin.value.trim().toUpperCase();
            const id = await getHashedId(pin);
            initPeer(null, pin, "LINKY-" + id);
        };

        function initPeer(id, pin, target = null) {
            peer = new Peer(id, { debug: 1 });
            peer.on('open', () => {
                if(id) {
                    myPin = pin;
                    document.getElementById('displayPin').innerText = pin;
                    document.getElementById('hostStatus').classList.remove('hidden');
                    notify("Waiting for peer...", "success");
                } else if(target) {
                    const c = peer.connect(target, { reliable: true });
                    setupConn(c);
                }
            });
            peer.on('connection', setupConn);
            peer.on('error', e => notify("Connection Failed", "error"));
        }

        function setupConn(c) {
            conn = c;
            conn.on('open', () => {
                notify("Tunnel Established", "success");
                UI.setup.classList.add('hidden');
                UI.workspace.classList.remove('hidden');
            });
            conn.on('data', handleData);
            conn.on('close', () => location.reload());
        }

        // Data Handling
        function handleData(pkt) {
            if(pkt.type === 'chat') appendChat("Peer", pkt.msg);
            if(pkt.type === 'meta') {
                flowBuf[pkt.id] = { name: pkt.name, size: pkt.size, data: [], rec: 0 };
                renderFlow(pkt.id, pkt.name, pkt.size, 'in');
            }
            if(pkt.type === 'chunk') {
                const b = flowBuf[pkt.id];
                if(!b) return;
                b.data.push(pkt.data);
                b.rec += pkt.data.byteLength;
                updateProgress(pkt.id, b.rec, b.size);
            }
            if(pkt.type === 'done') {
                const b = flowBuf[pkt.id];
                const blob = new Blob(b.data);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = b.name; a.click();
                logHistory(b.name, "Received");
                delete flowBuf[pkt.id];
            }
        }

        // File Sharing
        UI.dropZone.onclick = () => UI.fileInput.click();
        UI.fileInput.onchange = () => sendFiles(UI.fileInput.files);
        UI.dropZone.ondragover = e => { e.preventDefault(); UI.dropZone.style.borderColor = "#6366f1"; };
        UI.dropZone.ondragleave = () => UI.dropZone.style.borderColor = "";
        UI.dropZone.ondrop = e => { e.preventDefault(); UI.dropZone.style.borderColor = ""; sendFiles(e.dataTransfer.files); };

        async function sendFiles(files) {
            for(let f of files) {
                const id = Math.random().toString(36).substr(2, 9);
                renderFlow(id, f.name, f.size, 'out');
                conn.send({ type: 'meta', id, name: f.name, size: f.size });

                const reader = f.stream().getReader();
                let sent = 0;
                while(true) {
                    const {done, value} = await reader.read();
                    if(done) break;
                    let offset = 0;
                    while(offset < value.length) {
                        const chunk = value.slice(offset, offset + CHUNK_SIZE);
                        conn.send({ type: 'chunk', id, data: chunk });
                        offset += CHUNK_SIZE;
                        sent += chunk.byteLength;
                        updateProgress(id, sent, f.size);
                    }
                }
                conn.send({ type: 'done', id });
                logHistory(f.name, "Sent");
            }
        }

        // UI Utils
        function renderFlow(id, name, size, dir) {
            const el = document.createElement('div');
            el.id = "f-" + id;
            el.className = `glass p-5 rounded-2xl animate-slide border-l-4 ${dir === 'out' ? 'border-primary' : 'border-secondary'}`;
            el.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-black text-white truncate max-w-[150px]">${name}</span>
                    <span id="p-${id}" class="text-[9px] font-mono">0%</span>
                </div>
                <div class="w-full h-1 bg-slate-900 rounded-full overflow-hidden">
                    <div id="b-${id}" class="h-full bg-primary transition-all duration-300" style="width:0%"></div>
                </div>`;
            UI.streamBox.prepend(el);
        }

        function updateProgress(id, cur, tot) {
            const p = Math.min(100, Math.round((cur / tot) * 100));
            if(document.getElementById('b-' + id)) document.getElementById('b-' + id).style.width = p + "%";
            if(document.getElementById('p-' + id)) document.getElementById('p-' + id).innerText = p + "%";
            if(p === 100) setTimeout(() => document.getElementById('f-' + id)?.remove(), 3000);
        }

        function appendChat(user, msg) {
            const d = document.createElement('div');
            d.innerHTML = `<span class="${user === 'You' ? 'text-primary' : 'text-secondary'} mr-1">●</span> ${msg}`;
            UI.chatBox.appendChild(d);
            UI.chatBox.scrollTop = UI.chatBox.scrollHeight;
        }

        UI.sendBtn.onclick = () => {
            const m = UI.chatInput.value.trim();
            if(!m || !conn) return;
            conn.send({ type: 'chat', msg: m });
            appendChat("You", m);
            UI.chatInput.value = "";
        };

        function logHistory(name, status) {
            const d = document.createElement('div');
            d.className = "flex justify-between opacity-60";
            d.innerHTML = `<span>${name}</span> <span>${status}</span>`;
            UI.history.prepend(d);
        }

        function notify(m, type) {
            const t = document.createElement('div');
            t.className = `glass px-6 py-3 rounded-xl border text-[11px] font-bold animate-slide ${type === 'success' ? 'border-green-500 text-green-500' : 'border-red-500 text-red-500'}`;
            t.innerText = m;
            document.getElementById('toastRack').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
